<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weclever · Add-ons Stock · Traçabilité · Statistiques</title>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1b2333; --muted:#6b7689; --line:#e7ebf3;
  --brand:#1f6feb; --brand-d:#1657c4; --teal:#0fb6a8; --green:#16a34a; --amber:#f59e0b;
  --red:#e23b3b; --gray:#94a3b8; --soft:#eef3ff; --shadow:0 1px 2px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.05);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
a{color:var(--brand);text-decoration:none}
.app{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:236px;background:#0f1830;color:#cdd6ea;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--teal));display:grid;place-items:center;color:#fff;font-weight:800}
.brand b{color:#fff;font-size:16px;letter-spacing:.3px}
.brand small{display:block;color:#8a96b5;font-size:10.5px;font-weight:500}
.nav{padding:10px 8px;overflow-y:auto;flex:1}
.nav .group{color:#67739a;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 6px;font-weight:700}
.nav button{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:0;color:#c5cee6;padding:9px 12px;border-radius:9px;font-size:13.5px;text-align:left;margin:1px 0}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:linear-gradient(90deg,rgba(31,111,235,.28),rgba(15,182,168,.12));color:#fff;font-weight:600}
.nav button .ic{width:18px;text-align:center;opacity:.95}
.nav button .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;border-radius:10px;padding:1px 7px}
.sidebar .foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#7c88a8}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:17px;margin:0;font-weight:700;white-space:nowrap}
.topbar .sub{color:var(--muted);font-size:12px;white-space:nowrap}
.tb-title{flex-shrink:0}
.spacer{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:7px 12px;flex:1;min-width:120px;max-width:300px;color:var(--muted)}
@media(max-width:1150px){.topbar .sub{display:none}.rolepick>span{display:none}}
@media(max-width:920px){.search{display:none}}
.search input{border:0;background:transparent;outline:none;width:100%;font-size:13px;color:var(--ink)}
.rolepick{display:flex;align-items:center;gap:8px}
.rolepick select{border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff;font-size:13px;color:var(--ink)}
.sitepick select{border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff;font-size:13px;max-width:175px}
@media(max-width:1280px){.sitepick select{max-width:130px}}
.content{padding:24px 28px;max-width:1360px;width:100%;margin:0 auto}
.panel{overflow-x:auto}
/* Cards / KPI */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px;box-shadow:var(--shadow)}
.kpi .lab{color:var(--muted);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .val{font-size:25px;font-weight:800;margin-top:7px;letter-spacing:-.5px}
.kpi .delta{font-size:11.5px;font-weight:700;margin-top:4px}
.kpi .delta.up{color:var(--green)} .kpi .delta.down{color:var(--red)} .kpi .delta.flat{color:var(--muted)}
.kpi .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--soft);float:right;font-size:15px}
.grid{display:grid;gap:16px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.panel .ph{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.panel .ph h3{margin:0;font-size:14.5px}
.panel .ph .sub{color:var(--muted);font-size:12px}
.panel .pb{padding:14px 16px}
.row2{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.row1-1{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:980px){.row2,.row1-1{grid-template-columns:1fr}}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:#fafbff}
.t-num{text-align:right;font-variant-numeric:tabular-nums}
/* Pills / chips */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill.ok{background:#e7f7ee;color:#13863f} .pill.warn{background:#fff3e0;color:#b4730b}
.pill.crit{background:#fde8e8;color:#c42727} .pill.info{background:#e8f0fe;color:#1657c4}
.pill.gray{background:#eef1f6;color:#5b6677} .pill.teal{background:#e1f7f4;color:#0a8c81}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.g{background:var(--green)} .dot.a{background:var(--amber)} .dot.r{background:var(--red)} .dot.x{background:var(--gray)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600}
.btn:hover{border-color:#cfd8ea;background:#fbfcff}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-d)}
.btn.teal{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.danger{background:#fff;border-color:#f3c9c9;color:var(--red)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--brand)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btnbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
/* Filters */
.filters{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.filters select,.filters input{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;background:#fff;color:var(--ink)}
.seg{display:inline-flex;background:#eef1f7;border-radius:10px;padding:3px}
.seg button{border:0;background:transparent;padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* Alerts list */
.alert{display:flex;gap:11px;padding:11px 14px;border-bottom:1px solid var(--line);align-items:flex-start}
.alert:last-child{border-bottom:0}
.alert .ab{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:14px}
.alert .ab.red{background:#fde8e8;color:var(--red)} .alert .ab.amber{background:#fff3e0;color:var(--amber)}
.alert .ab.blue{background:#e8f0fe;color:var(--brand)} .alert .ab.teal{background:#e1f7f4;color:var(--teal)}
.alert .at{font-weight:600;font-size:13px} .alert .as{color:var(--muted);font-size:12px;margin-top:1px}
.alert .aa{margin-left:auto}
.empty{padding:30px;text-align:center;color:var(--muted);font-size:13px}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,24,48,.45);display:grid;place-items:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.wide{max-width:760px}
.modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal .mh h3{margin:0;font-size:16px}
.modal .mh .x{margin-left:auto;border:0;background:transparent;font-size:20px;color:var(--muted);cursor:pointer}
.modal .mb{padding:18px 20px}
.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13.5px;background:#fff;color:var(--ink);font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,111,235,.12)}
.field2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11.5px;color:var(--muted);margin-top:4px}
/* charts */
.bars{display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:10px}
.bars .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bars .bar .b{width:70%;max-width:46px;background:linear-gradient(180deg,var(--brand),#4d92ff);border-radius:6px 6px 0 0;transition:.3s}
.bars .bar .b.teal{background:linear-gradient(180deg,var(--teal),#43d6c9)}
.bars .bar .lbl{font-size:11px;color:var(--muted);text-align:center}
.bars .bar .vv{font-size:11px;font-weight:700}
.hbars .hb{display:grid;grid-template-columns:130px 1fr 64px;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
.hbars .hb .track{background:#eef1f7;border-radius:7px;height:18px;overflow:hidden}
.hbars .hb .fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--teal));border-radius:7px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:10px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0f1830;color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:.25s;display:flex;gap:9px;align-items:center}
.toast.show{opacity:1;bottom:30px}
.scanbox{border:2px dashed var(--brand);border-radius:12px;padding:16px;background:var(--soft);text-align:center;color:var(--brand-d);font-weight:600;margin-bottom:14px}
.tag-loc{font-size:11px;background:#eef1f6;color:#5b6677;padding:2px 7px;border-radius:6px}
.muted{color:var(--muted)}
.right{text-align:right}
.mono{font-variant-numeric:tabular-nums}
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tabbar button{border:0;background:transparent;padding:10px 14px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tabbar button.active{color:var(--brand);border-bottom-color:var(--brand)}
.notice{background:#fff8e6;border:1px solid #f5e3b3;color:#8a6400;border-radius:11px;padding:11px 14px;font-size:12.5px;display:flex;gap:9px;align-items:center;margin-bottom:14px}
.den{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.kv:last-child{border:0}
.kv b{font-weight:700}
.tline{font-size:12px;color:var(--muted)}
.steps{display:flex;gap:0;margin-bottom:18px}
.steps .st{flex:1;text-align:center;font-size:12px;color:var(--muted);position:relative;padding-bottom:8px}
.steps .st .n{width:26px;height:26px;border-radius:50%;background:#eef1f7;color:var(--muted);display:grid;place-items:center;margin:0 auto 6px;font-weight:700}
.steps .st.active .n{background:var(--brand);color:#fff}
.steps .st.done .n{background:var(--green);color:#fff}
.no-access{padding:50px;text-align:center;color:var(--muted)}
.no-access .lk{font-size:40px;margin-bottom:10px}
/* Login */
.login-bg{min-height:100vh;display:grid;place-items:center;background:radial-gradient(1200px 600px at 50% -10%,#16336b,#0f1830);padding:24px}
.login-card{background:#fff;border-radius:20px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4);overflow:hidden}
.login-head{background:linear-gradient(135deg,var(--brand),var(--teal));padding:28px 26px;color:#fff}
.login-head .logo{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center;margin-bottom:12px}
.login-head h2{margin:0;font-size:22px}.login-head p{margin:4px 0 0;opacity:.9;font-size:13px}
.login-body{padding:24px 26px}
.login-body .field label{color:var(--ink)}
/* AI assistant */
.ai-fab{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--teal));color:#fff;border:0;font-size:24px;box-shadow:0 10px 30px rgba(31,111,235,.45);z-index:90;display:grid;place-items:center}
.ai-fab:hover{transform:scale(1.05)}
.ai-panel{position:fixed;bottom:92px;right:24px;width:390px;max-width:calc(100vw - 32px);height:560px;max-height:calc(100vh - 130px);background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);z-index:91;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line)}
.ai-head{background:linear-gradient(135deg,var(--brand),var(--teal));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
.ai-head b{font-size:15px}.ai-head small{opacity:.85;font-size:11px;display:block}
.ai-head .x{margin-left:auto;background:transparent;border:0;color:#fff;font-size:20px;cursor:pointer}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;background:#f7f9fd}
.ai-msg{margin-bottom:12px;display:flex;gap:8px}
.ai-msg .av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:14px}
.ai-msg.bot .av{background:var(--soft)} .ai-msg.user{flex-direction:row-reverse}
.ai-msg.user .av{background:#0f1830;color:#fff}
.ai-bub{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13px;max-width:85%}
.ai-msg.user .ai-bub{background:var(--brand);color:#fff;border-color:var(--brand)}
.ai-bub table{font-size:12px;margin-top:6px}.ai-bub th,.ai-bub td{padding:5px 8px}
.ai-bub .big{font-size:20px;font-weight:800;color:var(--brand)}
.ai-sugg{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--line);background:#fff}
.ai-sugg button{font-size:11.5px;border:1px solid var(--line);background:#f7f9fd;border-radius:14px;padding:5px 10px;color:var(--brand);cursor:pointer}
.ai-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);background:#fff}
.ai-input input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;outline:none}
.ai-input button{border:0;background:var(--brand);color:#fff;border-radius:10px;width:42px;font-size:16px;cursor:pointer}
.qr-grid{display:inline-block;line-height:0;border:8px solid #fff;background:#fff}
/* Notifications */
.bell{position:relative;border:1px solid var(--line);background:#fff;border-radius:10px;width:38px;height:38px;font-size:17px;display:grid;place-items:center;cursor:pointer}
.bell:hover{background:#fbfcff;border-color:#cfd8ea}
.bell .nb{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:10px;min-width:17px;height:17px;display:grid;place-items:center;padding:0 4px}
.notif-panel{position:fixed;top:62px;right:18px;width:380px;max-width:calc(100vw - 24px);max-height:calc(100vh - 80px);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);z-index:80;display:flex;flex-direction:column;overflow:hidden}
.notif-panel .nh{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.notif-panel .nh b{font-size:14.5px}
.notif-panel .nbody{overflow-y:auto}
.notif-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:10px 16px 4px;background:#fafbff}
.notif-item{display:flex;gap:11px;padding:11px 16px;border-bottom:1px solid var(--line);align-items:flex-start;cursor:pointer}
.notif-item:hover{background:#fafbff}
.notif-item .ni{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;font-size:14px}
.notif-item .ni.red{background:#fde8e8;color:var(--red)} .notif-item .ni.amber{background:#fff3e0;color:var(--amber)}
.notif-item .nt{font-weight:600;font-size:13px}.notif-item .ns{color:var(--muted);font-size:12px;margin-top:1px}
.notif-empty{padding:36px;text-align:center;color:var(--muted)}
/* Booking */
.slotgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px}
.slot{padding:10px 6px;border-radius:9px;text-align:center;font-size:13.5px;font-weight:700;border:1px solid var(--line);cursor:pointer;transition:.12s}
.slot.free{background:#eef7f0;color:#13863f;border-color:#cdeccf}
.slot.free:hover{background:#16a34a;color:#fff;border-color:#16a34a}
.slot.booked{background:#eef1f7;color:#5b6677;cursor:default}
.slot.busy{background:#fde8e8;color:#c42727;cursor:default}
.slot small{display:block;font-size:10px;font-weight:600;opacity:.8;margin-top:2px}
.daypick{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px}
.daypill{flex-shrink:0;border:1px solid var(--line);border-radius:11px;padding:8px 12px;text-align:center;cursor:pointer;min-width:62px;background:#fff}
.daypill:hover{border-color:#cfd8ea}
.daypill.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.daypill.off{opacity:.4;cursor:not-allowed}
.daypill .dn{font-size:11px;opacity:.85;text-transform:capitalize}.daypill .dd{font-size:17px;font-weight:800}
/* ---- Messagerie interne ---- */
.chat-wrap{height:calc(100vh - 150px);display:flex;flex-direction:column}
.chat-layout{flex:1;display:grid;grid-template-columns:320px 1fr;gap:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;min-height:0}
.chat-list{display:flex;flex-direction:column;border-right:1px solid var(--line);min-height:0;background:#fbfcfe}
.chat-list-head{padding:10px;border-bottom:1px solid var(--line)}
.chat-search{display:flex;align-items:center;gap:7px;margin:8px 10px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 10px}
.chat-search input{border:0;outline:none;flex:1;font-size:13px;background:transparent}
.chat-filters{display:flex;gap:6px;flex-wrap:wrap;padding:0 10px 8px}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.chat-conv-scroll{flex:1;overflow-y:auto;min-height:0}
.chat-conv{display:flex;gap:10px;align-items:center;padding:10px 12px;cursor:pointer;border-bottom:1px solid #f1f4fa}
.chat-conv:hover{background:#fff}
.chat-conv.active{background:#eef4ff}
.chat-conv.unread .chat-conv-name{font-weight:800}
.chat-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#0fb6a8);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;flex-shrink:0}
.chat-av.sm{width:30px;height:30px;font-size:11px}
.chat-av.grp{background:linear-gradient(135deg,#6b7cff,#9d6bff)}
.chat-conv-mid{flex:1;min-width:0}
.chat-conv-top{display:flex;justify-content:space-between;gap:6px}
.chat-conv-name{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-conv-time{font-size:11px;color:var(--muted);flex-shrink:0}

/* ---------- QR generator (Model 2, byte mode, EC-M, mask 0, v1-7) ---------- */
const QR=(function(){
  var EXP=new Array(512),LOG=new Array(256),x=1;
  for(var i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&0x100)x^=0x11D;}
  for(i=255;i<512;i++)EXP[i]=EXP[i-255];
  function gmul(a,b){return (a===0||b===0)?0:EXP[LOG[a]+LOG[b]];}
  function rsGen(deg){var p=[1];for(var i=0;i<deg;i++){var np=new Array(p.length+1).fill(0);for(var j=0;j<p.length;j++){np[j]^=gmul(p[j],EXP[i]);np[j+1]^=p[j];}p=np;}return p;}
  function rsEcc(data,deg){var gen=rsGen(deg),res=data.slice();for(var z=0;z<deg;z++)res.push(0);for(var i=0;i<data.length;i++){var c=res[i];if(c!==0)for(var j=0;j<gen.length;j++)res[i+j]^=gmul(gen[j],c);}return res.slice(data.length);}
  var VTAB={1:[1,16,10],2:[1,28,16],3:[1,44,26],4:[2,32,18],5:[2,43,24],6:[4,27,16],7:[4,31,18]};
  var ALIGN={1:[],2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38]};
  var FORMAT_M0="101010000010010";
  function chooseVersion(len){for(var v=1;v<=7;v++){var t=VTAB[v];if((4+8+len*8)<=t[0]*t[1]*8)return v;}return null;}
  function toBytes(str){var out=[],i,c;for(i=0;i<str.length;i++){c=str.charCodeAt(i);if(c<128)out.push(c);else if(c<2048){out.push(192|(c>>6));out.push(128|(c&63));}else{out.push(224|(c>>12));out.push(128|((c>>6)&63));out.push(128|(c&63));}}return out;}
  function build(text){
    var bytes=toBytes(text),v=chooseVersion(bytes.length);if(v===null)throw new Error("QR: texte trop long");
    var t=VTAB[v],blocks=t[0],dpb=t[1],ecc=t[2],totalData=blocks*dpb,bits=[];
    function push(val,n){for(var b=n-1;b>=0;b--)bits.push((val>>b)&1);}
    push(4,4);push(bytes.length,8);for(var i=0;i<bytes.length;i++)push(bytes[i],8);
    var cap=totalData*8;for(var k=0;k<4&&bits.length<cap;k++)bits.push(0);while(bits.length%8!==0)bits.push(0);
    var cw=[];for(i=0;i<bits.length;i+=8){var by=0;for(var j=0;j<8;j++)by=(by<<1)|bits[i+j];cw.push(by);}
    var pad=[0xEC,0x11],pi=0;while(cw.length<totalData){cw.push(pad[pi%2]);pi++;}
    var dataB=[],eccB=[];for(var b=0;b<blocks;b++){var blk=cw.slice(b*dpb,(b+1)*dpb);dataB.push(blk);eccB.push(rsEcc(blk,ecc));}
    var fin=[];for(i=0;i<dpb;i++)for(b=0;b<blocks;b++)fin.push(dataB[b][i]);for(i=0;i<ecc;i++)for(b=0;b<blocks;b++)fin.push(eccB[b][i]);
    var size=17+4*v,m=[],fn=[];for(i=0;i<size;i++){m.push(new Array(size).fill(0));fn.push(new Array(size).fill(false));}
    function setF(r,c,val){if(r<0||c<0||r>=size||c>=size)return;m[r][c]=val;fn[r][c]=true;}
    function finder(r,c){for(var dr=-1;dr<=7;dr++)for(var dc=-1;dc<=7;dc++){var on=(dr>=0&&dr<=6&&(dc===0||dc===6))||(dc>=0&&dc<=6&&(dr===0||dr===6))||(dr>=2&&dr<=4&&dc>=2&&dc<=4);setF(r+dr,c+dc,on?1:0);}}
    finder(0,0);finder(0,size-7);finder(size-7,0);
    for(i=8;i<size-8;i++){setF(6,i,i%2===0?1:0);setF(i,6,i%2===0?1:0);}
    var ac=ALIGN[v];for(var ai=0;ai<ac.length;ai++)for(var aj=0;aj<ac.length;aj++){var r=ac[ai],c=ac[aj];if((r<=8&&c<=8)||(r<=8&&c>=size-9)||(r>=size-9&&c<=8))continue;for(var d1=-2;d1<=2;d1++)for(var d2=-2;d2<=2;d2++){var on=Math.max(Math.abs(d1),Math.abs(d2));setF(r+d1,c+d2,on===1?0:1);}}
    setF(4*v+9,8,1);
    for(i=0;i<9;i++){if(i!==6){if(!fn[8][i])fn[8][i]=true;if(!fn[i][8])fn[i][8]=true;}}
    for(i=0;i<8;i++){fn[8][size-1-i]=true;fn[size-1-i][8]=true;}fn[8][6]=true;fn[6][8]=true;
    var di=0,up=true;
    for(var col=size-1;col>0;col-=2){if(col===6)col--;for(var rw=0;rw<size;rw++){var rr=up?size-1-rw:rw;for(var cc=0;cc<2;cc++){var c2=col-cc;if(fn[rr][c2])continue;var bit=0;if(di<fin.length*8)bit=(fin[di>>3]>>(7-(di&7)))&1;di++;if(((rr+c2)%2)===0)bit^=1;m[rr][c2]=bit;}}up=!up;}
    var fp1=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    var fp2=[[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],[8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
    for(i=0;i<15;i++){var bv=FORMAT_M0.charCodeAt(i)-48;m[fp1[i][0]][fp1[i][1]]=bv;m[fp2[i][0]][fp2[i][1]]=bv;}
    return {size:size,modules:m,version:v};
  }
  return {build:build};
})();
function qrSVG(text,px){px=px||4;var q;try{q=QR.build(text);}catch(e){return '<div style="color:#c00;font-size:11px">QR indisponible</div>';}

function isoOf(d){return d.toISOString().slice(0,10);}
function periodRange(p,base){base=base||today;p=p||state.period||"month";
  const d=new Date(base);const y=d.getFullYear();
  if(p==="day")return{start:isoOf(d),end:isoOf(d)};
  if(p==="week"){const wd=(d.getDay()+6)%7;const s=new Date(d);s.setDate(d.getDate()-wd);const e=new Date(s);e.setDate(s.getDate()+6);return{start:isoOf(s),end:isoOf(e)};}
  if(p==="month")return{start:isoOf(new Date(y,d.getMonth(),1)),end:isoOf(new Date(y,d.getMonth()+1,0))};
  if(p==="quarter"){const q=Math.floor(d.getMonth()/3);return{start:isoOf(new Date(y,q*3,1)),end:isoOf(new Date(y,q*3+3,0))};}
  if(p==="year")return{start:y+"-01-01",end:y+"-12-31"};
  return{start:"0000-01-01",end:"9999-12-31"};/* all */}
function periodRangePrev(p){if(p==="month"){const d=new Date(today);d.setMonth(d.getMonth()-1);return periodRange("month",d);}
  if(p==="year"){const d=new Date(today);d.setFullYear(d.getFullYear()-1);return periodRange("year",d);}
  if(p==="week"){const d=new Date(today);d.setDate(d.getDate()-7);return periodRange("week",d);}
  if(p==="quarter"){const d=new Date(today);d.setMonth(d.getMonth()-3);return periodRange("quarter",d);}
  if(p==="day"){const d=new Date(today);d.setDate(d.getDate()-1);return periodRange("day",d);}
  return periodRange(p);}

function specialtyOf(a){const f=(a.family||"").toUpperCase();const l=(a.act||"").toLowerCase();
  if(/IMP/.test(f)||/implant/.test(l))return "Implantologie";
  if(/ORT|TO|ODF/.test(f)||/orthodonti|bague|aligneur|multi.?attache/.test(l))return "Orthodontie";
  if(/CZ|IC|CT|PF|BR|PA/.test(f)||/couronne|inlay|onlay|bridge|proth|pilier|facette|provisoire|inlay core/.test(l))return "Prothèses";
  if(/ASC|GBD|chir/.test(f)||/avulsion|extraction|chirurgie|greffe|membrane|sinus/.test(l))return "Chirurgie";
  if(/AXI|prev/.test(f)||/detartr|détartr|prophyl|prevention|fluor|scellement/.test(l))return "Prévention";
  if(/END/.test(f)||/biopulp|endodonti|pulpect|obturation canal|carie|composite|soin|amalgame|restaur/.test(l))return "Soins";
  if(/blanchiment|esthet|esthét/.test(l))return "Esthétique";
  return "Soins";}

function productStock(p){

function donut(data,opts={}){ // [{lbl,val,color}]

    if(mqNeedsRenewal(cur))pb.appendChild(el("div",{style:"background:#fff8ef;border:1px solid #f6d9b0;border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:8px"},"🔄",el("span",{style:"flex:1"},el("b",{},"Rappel annuel — "+mqRenewalLabel(cur))),can("sendMedical")?el("button",{class:"btn sm primary",onclick:()=>mqRequestUpdate(cur.id)},"Renouveler"):null));
    {const bb=wqStore();const prev=mqPrevOf(bb,cur);if(prev&&Object.keys(cur.answers||{}).length){const inco=mqInconsistencies(prev.answers,cur.answers);if(inco.length){const ncrit=inco.filter(c=>c.level==="critique").length;
      pb.appendChild(el("div",{style:"background:"+(ncrit?"#fdecec":"#fff5e8")+";border:1px solid "+(ncrit?"#f6c9c9":"#f6e0bf")+";border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:8px"},
        ncrit?"🚨":"⚠️",el("span",{style:"flex:1"},el("b",{},inco.length+" incohérence(s) vs version précédente"),ncrit?el("span",{}," · "+ncrit+" à confirmer"):null),el("button",{class:"btn sm",onclick:()=>openMedicalDetail(cur.id)},"Voir")));}}}
    if((cur.alerts||[]).length){const ab=el("div",{style:"display:flex;gap:6px;flex-wrap:wrap"});
      cur.alerts.forEach(a=>ab.appendChild(el("span",{class:"pill "+(a.level==="critique"?"crit":a.level==="vigilance"?"warn":"info")},(a.level==="critique"?"🚨 ":a.level==="vigilance"?"⚠️ ":"")+a.title)));pb.appendChild(ab);
      if(crit.length)pb.appendChild(el("div",{class:"hint",style:"color:var(--red);font-weight:600;margin-top:6px"},"🚨 "+crit.length+" alerte(s) critique(s) — à contrôler avant l'acte."));}
    else if(["Signé","Vérifié praticien","Intégré au dossier"].indexOf(mqStatusOf(cur))>=0)pb.appendChild(el("div",{class:"muted",style:"font-size:13px"},"✓ Aucune alerte médicale détectée."));
    if(mqStatusOf(cur)==="Signé"&&can("verifyMedical"))pb.appendChild(el("button",{class:"btn sm",style:"margin-top:8px",onclick:()=>{const bb=wqStore();const x=bb.items.find(y=>y.id===cur.id);x.status="Vérifié praticien";x.verifiedAt=todayISO;x.verifiedBy=cur.practitioner;wqLog(bb,"Vérification praticien",x.patientName);wqSaveRaw(bb);render();toast("Questionnaire vérifié");}},"✓ Marquer vérifié par le praticien"));
  }
  panel.appendChild(pb);return panel;
}

/* ======================================================================
   MESSAGERIE INTERNE SÉCURISÉE  (module Discussion)
   - Stockage réel : table Supabase wc_chat (cross-appareils) + repli localStorage.
   - Réutilise el/modal/toast/CAPS/can/ROLES + couche supaGet/supaUpsert.
   ====================================================================== */
const CHAT_LS="wc_chat_v1";
let CHAT={convs:[],msgs:[],loaded:false,online:false,missing:false,err:""};
let chatPoll=null;
function chatLoadLS(){try{const o=JSON.parse(localStorage.getItem(CHAT_LS));if(o){CHAT.convs=o.convs||[];CHAT.msgs=o.msgs||[];CHAT._seeded=o._seeded;}}catch(e){}}
function chatSaveLS(){try{localStorage.setItem(CHAT_LS,JSON.stringify({convs:CHAT.convs,msgs:CHAT.msgs,_seeded:CHAT._seeded}));}catch(e){}}
function chatRow(kind,id,conv,data){return {id:kind+"_"+id,kind,conv,data};}
async function chatCloudPush(rows){if(!CHAT.online)return;try{await supaUpsert("wc_chat",rows,"id");}catch(e){console.error(e);}}
function chatPersist(changed){chatSaveLS();if(CHAT.online&&changed&&changed.length)chatCloudPush(changed);}
async function chatBoot(force){
  if(CHAT.loaded&&!force)return;CHAT.loaded=true;chatLoadLS();chatSeed();
  if(supaReady()){try{
    const rows=await supaGet("wc_chat?select=kind,conv,data");
    CHAT.online=true;CHAT.missing=false;
    const cConv=rows.filter(r=>r.kind==="conv").map(r=>r.data),cMsg=rows.filter(r=>r.kind==="msg").map(r=>r.data);
    if(!cConv.length&&CHAT.convs.length){ // 1ʳᵉ mise en ligne : on pousse le local
      await chatCloudPush(CHAT.convs.map(c=>chatRow("conv",c.id,c.id,c)).concat(CHAT.msgs.map(m=>chatRow("msg",m.id,m.conv,m))));
    }else{CHAT.convs=cConv;CHAT.msgs=cMsg;chatSaveLS();}
    CHAT._seen=new Set(CHAT.msgs.map(m=>m.id));
    if(state.view==="chat"||state.tab.trace==="patient")render();
    chatStartPoll();
  }catch(e){const s=String(e.message||e);if(/wc_chat|PGRST205|schema cache/i.test(s)){CHAT.missing=true;}CHAT.online=false;CHAT.err=s;}}
}
function chatStartPoll(){if(chatPoll||!CHAT.online)return;chatPoll=setInterval(async()=>{
  if(!state.authed)return;
  const inChat=state.view==="chat";if(!inChat&&state.tab.trace!=="patient"&&!chatPrefs().browserNotif)return;
  const typingFocus=document.activeElement&&document.activeElement.classList&&document.activeElement.classList.contains("chat-input");
  try{const rows=await supaGet("wc_chat?select=kind,conv,data");
    const cConv=rows.filter(r=>r.kind==="conv").map(r=>r.data),cMsg=rows.filter(r=>r.kind==="msg").map(r=>r.data);
    CHAT.typing=rows.filter(r=>r.kind==="typing").map(r=>r.data);
    // notifications navigateur sur nouveaux messages entrants
    const me=chatMeId();cMsg.forEach(m=>{if(CHAT._seen&&!CHAT._seen.has(m.id)){CHAT._seen.add(m.id);
      if(m.senderId!==me&&!m.deletedAt){const c=cConv.find(x=>x.id===m.conv);if(c&&chatVisible(c)&&!(c.mutedBy||[]).includes(me)){
        const viewing=state.view==="chat"&&state.tab.chat===m.conv&&!document.hidden;
        if(!viewing)chatNotify(c,m);}}}});
    const changed=JSON.stringify(cMsg)!==JSON.stringify(CHAT.msgs)||JSON.stringify(cConv)!==JSON.stringify(CHAT.convs);
    if(changed){CHAT.convs=cConv;CHAT.msgs=cMsg;chatSaveLS();}
    // ne pas réafficher si l'utilisateur est en train d'écrire (préserve focus/curseur)
    if((changed||CHAT.typing.length)&&!typingFocus&&document.querySelector(".chat-layout"))render();
    else if(changed&&(state.view!=="chat"))render(); // badge non-lus hors messagerie
  }catch(e){}
},3500);}
/* ---- préférences & notifications ---- */
function chatPrefs(){try{return JSON.parse(localStorage.getItem("wc_chat_prefs"))||{browserNotif:false};}catch(e){return {browserNotif:false};}}
function chatSetPrefs(p){localStorage.setItem("wc_chat_prefs",JSON.stringify(p));}
function chatToggleBrowserNotif(){const p=chatPrefs();if(!p.browserNotif){if(!("Notification"in window)){toast("Notifications non supportées","warn");return;}
    Notification.requestPermission().then(perm=>{if(perm==="granted"){p.browserNotif=true;chatSetPrefs(p);toast("Notifications navigateur activées");render();}else toast("Autorisation refusée","warn");});}
  else{p.browserNotif=false;chatSetPrefs(p);toast("Notifications navigateur désactivées");render();}}
function chatNotify(c,m){if(!chatPrefs().browserNotif||!("Notification"in window)||Notification.permission!=="granted")return;

  const me=chatMeId();chatCloudPush([{id:"typing_"+cid+"_"+me,kind:"typing",conv:cid,data:{userId:me,name:chatUser(me).name,conv:cid,at:new Date().toISOString()}}]);}

/* ---- roster réel : utilisateurs INSCRITS (wc_users) + équipe démo ---- */
function chatTeam(){const T=[];

  (AUTHDB.users||[]).forEach(u=>T.push({id:"u_"+u.id,name:u.name,role:u.role,site:u.site,registered:true}));

  (DB.assistants||[]).forEach(a=>{if(!T.some(u=>wcNorm(u.name)===wcNorm(a.name)))T.push({id:"u_"+a.id,name:a.name,role:"assistante",site:a.site});});
  const meName=state.userName||"Moi";if(!T.some(u=>u.id===chatMeId()))T.push({id:chatMeId(),name:meName,role:state.role,site:state.site==="all"?"all":state.site});
  return T;}
function chatMeId(){
  if(state.authUid)return "u_"+state.authUid;

  if(m)return "u_"+m.id;

function chatUser(id){return chatTeam().find(u=>u.id===id)||{id,name:id.replace(/^u_/,""),role:"membre",site:"all"};}
function chatInitials(name){return (name||"?").split(" ").filter(Boolean).map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function chatAvatar(name,cls){return el("div",{class:"chat-av "+(cls||"")},chatInitials(name));}
/* ---- droits / visibilité ---- */
function chatCanPatient(){return ["administrateur","directeur","responsable","praticien","assistante","qualite"].indexOf(state.role)>=0;}
function chatVisible(c){const me=chatMeId();
  if(c.type==="site")return state.role==="administrateur"||state.role==="directeur"||(c.siteId&&(state.site==="all"||state.site===c.siteId))||(c.participants||[]).indexOf(me)>=0;
  if((c.participants||[]).indexOf(me)<0)return false;
  if(c.patientId&&!chatCanPatient())return false;
  return true;}
function chatMyConvs(){return CHAT.convs.filter(chatVisible);}
function chatMsgsOf(cid){return CHAT.msgs.filter(m=>m.conv===cid).sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));}
function chatLastMsg(cid){const m=chatMsgsOf(cid);return m[m.length-1]||null;}
function chatUnread(cid){const me=chatMeId();return chatMsgsOf(cid).filter(m=>m.senderId!==me&&!m.deletedAt&&!(m.readBy||{})[me]).length;}
function chatUnreadTotal(){return chatMyConvs().filter(c=>!(c.archivedBy||[]).includes(chatMeId())).reduce((n,c)=>n+chatUnread(c.id),0);}
function chatMentionsForMe(){const me=chatMeId();return CHAT.msgs.filter(m=>(m.mentions||[]).includes(me)&&!(m.readBy||{})[me]).length;}
function chatConvTitle(c){const me=chatMeId();
  if(c.type==="private"){const other=(c.participants||[]).find(p=>p!==me);return chatUser(other||"").name;}
  if(c.title)return c.title;
  if(c.type==="patient")return "Patient · "+(c.patientName||patName(c.patientId)||"");
  if(c.type==="appointment")return "RDV · "+(c.title||c.patientName||"");
  if(c.type==="quote")return "Devis · "+(c.title||"");
  return "Conversation";}
function chatTypeIcon(t){return {private:"👤",group:"👥",patient:"🦷",appointment:"📅",quote:"💶",site:"🏥"}[t]||"💬";}
/* ---- actions ---- */
function chatNewConv(o){const me=chatMeId();const now=new Date().toISOString();
  const c=Object.assign({id:uid("cv"),type:"group",title:"",participants:[me],admins:[me],createdBy:me,createdAt:now,lastMessageAt:now,archivedBy:[],mutedBy:[],pinnedBy:[]},o);
  CHAT.convs.push(c);chatPersist([chatRow("conv",c.id,c.id,c)]);return c;}
function chatFindOrPrivate(otherId){const me=chatMeId();
  const ex=CHAT.convs.find(c=>c.type==="private"&&(c.participants||[]).length===2&&c.participants.includes(me)&&c.participants.includes(otherId));
  if(ex)return ex;return chatNewConv({type:"private",participants:[me,otherId],admins:[me,otherId]});}
function chatSend(cid,content,opts){opts=opts||{};const me=chatMeId();const u=chatUser(me);const now=new Date().toISOString();
  if(!content.trim()&&!(opts.attachments&&opts.attachments.length))return;
  const mentions=chatParseMentions(content);
  const m={id:uid("ms"),conv:cid,senderId:me,senderName:u.name,content:content,type:opts.attachments&&opts.attachments.length?(opts.attachments[0].type.indexOf("image")===0?"image":"file"):(opts.system?"system":"text"),
    replyTo:opts.replyTo||null,attachments:opts.attachments||[],mentions:mentions,important:false,readBy:{[me]:now},createdAt:now};
  CHAT.msgs.push(m);const c=CHAT.convs.find(x=>x.id===cid);if(c){c.lastMessageAt=now;}
  chatPersist([chatRow("msg",m.id,cid,m)].concat(c?[chatRow("conv",c.id,c.id,c)]:[]));return m;}
function chatSysMsg(cid,text){const now=new Date().toISOString();const m={id:uid("ms"),conv:cid,senderId:"system",senderName:"",content:text,type:"system",attachments:[],mentions:[],readBy:{},createdAt:now};CHAT.msgs.push(m);chatPersist([chatRow("msg",m.id,cid,m)]);}
function chatParseMentions(text){const team=chatTeam();const out=[];(text.match(/@([\wÀ-ÿ.'-]+(?:\s[\wÀ-ÿ.'-]+)?)/g)||[]).forEach(tok=>{const n=wcNorm(tok.slice(1));const u=team.find(t=>wcNorm(t.name).indexOf(n)===0||wcNorm(t.name.split(" ")[0])===n);if(u&&out.indexOf(u.id)<0)out.push(u.id);});return out;}
function chatMarkRead(cid){const me=chatMeId();const now=new Date().toISOString();const changed=[];chatMsgsOf(cid).forEach(m=>{if(m.senderId!==me&&!(m.readBy||{})[me]){m.readBy=m.readBy||{};m.readBy[me]=now;changed.push(chatRow("msg",m.id,cid,m));}});if(changed.length)chatPersist(changed);}
function chatToggle(cid,field){const me=chatMeId();const c=CHAT.convs.find(x=>x.id===cid);if(!c)return;c[field]=c[field]||[];const i=c[field].indexOf(me);if(i>=0)c[field].splice(i,1);else c[field].push(me);chatPersist([chatRow("conv",c.id,c.id,c)]);}
function chatMsgImportant(mid){const m=CHAT.msgs.find(x=>x.id===mid);if(!m)return;m.important=!m.important;chatPersist([chatRow("msg",m.id,m.conv,m)]);}
function chatMsgDelete(mid){const m=CHAT.msgs.find(x=>x.id===mid);if(!m||m.senderId!==chatMeId())return;m.deletedAt=new Date().toISOString();m.content="";m.attachments=[];chatPersist([chatRow("msg",m.id,m.conv,m)]);}
function chatGroupAddMember(cid,uid2){const c=CHAT.convs.find(x=>x.id===cid);if(!c||(c.participants||[]).includes(uid2))return;c.participants.push(uid2);chatSysMsg(cid,chatUser(chatMeId()).name+" a ajouté "+chatUser(uid2).name+" au groupe");chatPersist([chatRow("conv",c.id,c.id,c)]);}
function chatGroupRemoveMember(cid,uid2){const c=CHAT.convs.find(x=>x.id===cid);if(!c)return;c.participants=(c.participants||[]).filter(p=>p!==uid2);chatSysMsg(cid,chatUser(uid2).name+" a quitté le groupe");chatPersist([chatRow("conv",c.id,c.id,c)]);}
/* ---- seed démo (une fois) ---- */
function chatSeed(){if(CHAT._seeded||CHAT.convs.length)return;CHAT._seeded=true;
  const T=chatTeam();const find=r=>T.find(u=>u.role===r)||T[0];
  const prat=(DB.practitioners||[]).map(p=>"u_"+p.id);const asst=(DB.assistants||[]).map(a=>"u_"+a.id);
  const dir="u_dir";const D=(h)=>{const t=new Date(today);t.setHours(t.getHours()+h);return t.toISOString();};
  // privé direction <-> praticien
  const c1={id:uid("cv"),type:"private",participants:[dir,prat[0]],admins:[dir,prat[0]],createdBy:dir,createdAt:D(-30),lastMessageAt:D(-2),archivedBy:[],mutedBy:[],pinnedBy:[]};
  // groupe équipe clinique
  const c2={id:uid("cv"),type:"group",title:"Équipe clinique",participants:[dir].concat(prat).concat(asst.slice(0,2)),admins:[dir],createdBy:dir,createdAt:D(-40),lastMessageAt:D(-1),archivedBy:[],mutedBy:[],pinnedBy:[]};
  // patient (Martin Dubois pt1)

  CHAT.convs.push(c1,c2,c3);
  const M=(conv,sid,txt,h,imp)=>CHAT.msgs.push({id:uid("ms"),conv,senderId:sid,senderName:chatUser(sid).name,content:txt,type:"text",attachments:[],mentions:[],important:!!imp,readBy:{[sid]:D(h)},createdAt:D(h)});
  M(c1.id,prat[0],"Bonjour, peux-tu valider le plan de traitement de M. Dubois avant 14h ?",-50);
  M(c1.id,dir,"Oui je regarde ça ce matin 👍",-48);
  M(c2.id,dir,"Rappel : réunion d'équipe vendredi 13h. Plateau chirurgie à préparer pour les implants de la semaine.",-30);
  M(c2.id,asst[0]?asst[0]:prat[0],"Bien noté, je prépare les plateaux la veille.",-26);
  M(c3.id,prat[0],"⚠️ Vérifier que le consentement implantaire de M. Dubois est signé avant le RDV.",-40,true);
  M(c3.id,asst[0]?asst[0]:dir,"Je rappelle le patient pour confirmer l'ordonnance.",-30);
  chatSaveLS();}
/* ---- pièces jointes ---- */
function chatReadFiles(files,cb){const out=[];let n=0;if(!files.length)return cb(out);
  [].slice.call(files).forEach(f=>{if(f.size>3*1024*1024){toast(f.name+" : fichier trop lourd (max 3 Mo)","warn");if(++n===files.length)cb(out);return;}
    const r=new FileReader();r.onload=()=>{out.push({name:f.name,type:f.type||"application/octet-stream",size:f.size,dataUrl:r.result});if(++n===files.length)cb(out);};r.readAsDataURL(f);});}
const CHAT_SQL="create table if not exists wc_chat (id text primary key, kind text, conv text, data jsonb not null, updated_at timestamptz default now());\ncreate index if not exists wc_chat_conv on wc_chat(conv);\nalter table wc_chat enable row level security;\ncreate policy wc_chat_all on wc_chat for all using (true) with check (true);";

  const ta=el("textarea",{rows:"6",readonly:true,style:"width:100%;font-family:monospace;font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:8px"},CHAT_SQL);

/* ---- IA : résumé extractif + détection d'actions ---- */
const CHAT_ACTION_RE=/peux-tu|peux tu|pourrais-tu|merci de|il faut|faut-il|pense[zr]? à|à faire|rappel(?:er|le)|v[ée]rifie|pr[ée]pare|confirme|envoie|envoyer|relance|pr[ée]voir|à pr[ée]voir|n'oublie|urgent/i;
function chatExtractActions(msgs){return msgs.filter(m=>!m.deletedAt&&m.type!=="system"&&(m.important||CHAT_ACTION_RE.test(m.content||"")));}
function chatSummaryHTML(cid){const c=CHAT.convs.find(x=>x.id===cid);if(!c)return "Conversation introuvable.";
  const msgs=chatMsgsOf(cid).filter(m=>!m.deletedAt&&m.type!=="system");
  const acts=chatExtractActions(msgs);const imps=msgs.filter(m=>m.important);
  let s="<b>"+chatConvTitle(c)+"</b> · "+(c.participants||[]).length+" membres · "+msgs.length+" messages.";
  if(c.patientId)s+="<br>Patient lié : <b>"+(c.patientName||patName(c.patientId))+"</b>.";
  if(acts.length){s+="<br><br><b>🎯 Actions à faire détectées :</b><ul style='margin:6px 0 0;padding-left:18px'>"+acts.slice(0,8).map(m=>"<li>"+chatUser(m.senderId).name.split(" ")[0]+" : "+(m.content||"").replace(/</g,"&lt;").slice(0,140)+"</li>").join("")+"</ul>";}
  else s+="<br><br>Aucune action explicite détectée.";
  if(imps.length)s+="<br><b>⭐ "+imps.length+" message(s) marqué(s) important(s).</b>";
  return s;}
function chatSummaryModal(cid){const body=el("div",{},el("div",{class:"hint",style:"margin-bottom:8px"},"Résumé automatique (analyse locale des messages — extractif, sans IA externe)."),el("div",{html:chatSummaryHTML(cid)}));
  modalOpen("✨ Résumé de la conversation",body,[{label:"Fermer",fn:modalClose}]);}
